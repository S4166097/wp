<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetConnect - Add Pet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="container">

        <nav class="navbar navbar-expand-sm bg-dark navbar-dark mb-3 rounded">
            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="pets.html">Browse Pets</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="gallery.html">Gallery</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="add.html">Add Pet</a>
                </li>

            </ul>
        </nav>

        <main>

            <h1>Add a New Pet for Adoption</h1>

            <form>

                <div class="col-md-6 mb-3">
                    <label class="form-label" for="name">Pet Name</label>
                    <input class="form-control" id="name" type="text" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label" for="species">Species</label>
                    <select class="form-select" id="species" required>
                        <option value="">Select type</option>
                        <option value="Dog">Dog</option>
                        <option value="Cat">Cat</option>
                        <option value="Bird">Bird</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="price">Adoption Fee</label>
                    <input class="form-control" id="price" type="number" required>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="description">Description</label>
                    <textarea class="form-control" id="description" rows="4" required></textarea>
                </div>

                <button class="btn btn-primary" type="submit">
                    Add Pet
                </button>

            </form>

        </main>

        <footer class="text-center bg-light py-3">
            © 2026 s4166097. Connecting pets with loving homes.
        </footer>

    </div>

    <script src="assets/js/scripts.js"></script>

</body>

</html>
